name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an in-flight run when a branch is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build and test on Linux and macOS. gofmt and vet run here too so a
  # formatting slip fails fast on both platforms. gr is a pure-Go library, so
  # the build leg pins CGO_ENABLED=0 to prove it stays cgo-free; the race
  # detector needs cgo, so only the test leg turns it on.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt -s -w:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        env:
          CGO_ENABLED: "0"
        run: go vet ./...
      - name: build (cgo-free)
        env:
          CGO_ENABLED: "0"
        run: go build ./...
      - name: build (32-bit targets)
        if: matrix.os == 'ubuntu-latest'
        env:
          CGO_ENABLED: "0"
        # The release ships 386 and arm builds, where int is 32 bits. Build them
        # here so a 32-bit-only overflow fails a PR instead of the release.
        run: |
          GOARCH=386 go build ./...
          GOARCH=arm go build ./...
      - name: test
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -func=coverage.out | tail -1

  # golangci-lint bundles staticcheck, govet, ineffassign, errcheck, unused and
  # more, so it is the main quality gate. The tuned config lives in .golangci.yml.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: latest

  # Scan the module and its dependencies for known vulnerabilities.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Confirm go.mod stays tidy: a PR that adds an import without running go mod
  # tidy fails here instead of breaking a later release. gr has no third-party
  # dependencies, so go.sum is expected to stay absent.
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
