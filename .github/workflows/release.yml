name: release

# Pushing a version tag kicks off the full release pipeline through GoReleaser.
# Pull requests and pushes to main run `goreleaser check` only, so a config
# that would fail a real release is caught before the tag.
#
# The release job runs the full test suite (including config-freeze, API
# stability, conformance, and race-detector gates) before calling GoReleaser,
# so a tag cannot produce a release from a build that fails any gate.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate: the goreleaser config is valid. Runs on every PR and push.
  check:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

  # Full release on a version tag.
  release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub release
      packages: write  # push the image to ghcr.io
      id-token: write  # keyless cosign signing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      # Release gates: full test suite + race detector. GoReleaser only runs
      # if all pass; a failing gate produces no release artifacts.
      - name: Test (including config-freeze, API stability, conformance gates)
        run: go test ./...

      - name: Test with race detector
        run: CGO_ENABLED=1 go test -race ./...

      # Cross-platform container image support.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Signing and SBOM tools.
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0.24.0

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
